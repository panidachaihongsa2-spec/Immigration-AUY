<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ระบบสอบออนไลน์ - ข้อสอบตรวจคนเข้าเมือง</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header class="official-header">
      <div class="container py-3">
        <div class="d-flex align-items-center gap-3">
          <div class="emblem" aria-hidden="true">ตรา</div>
          <div>
            <p class="mb-1 small text-gold">ระบบทดสอบความรู้</p>
            <h1 class="h4 mb-0">ข้อสอบออนไลน์ตรวจคนเข้าเมือง</h1>
          </div>
        </div>
      </div>
    </header>

    <main class="container my-4">
      <section id="emptyState" class="notice-panel d-none">
        <h2 class="h5">ยังไม่มีข้อมูลข้อสอบ</h2>
        <p class="mb-0">
          เพิ่มข้อสอบในตัวแปร <code>questions</code> และเฉลยในตัวแปร <code>answerKey</code>
          ภายในไฟล์ <code>script.js</code> ระบบจะพร้อมใช้งานทันที
        </p>
      </section>

      <section id="examApp" class="exam-shell">
        <div class="status-bar">
          <div>
            <span class="label">เวลาคงเหลือ</span>
            <strong id="timer">120:00</strong>
          </div>
          <div>
            <span class="label">คะแนนล่าสุด</span>
            <strong id="scorePreview">-</strong>
          </div>
        </div>

        <div class="progress exam-progress" role="progressbar" aria-label="ความคืบหน้าการทำข้อสอบ">
          <div id="progressBar" class="progress-bar" style="width: 0%">0%</div>
        </div>

        <div class="row g-4 mt-1">
          <aside class="col-lg-3">
            <div class="question-map">
              <h2 class="h6">หมายเลขข้อ</h2>
              <div id="questionNumbers" class="question-numbers"></div>
            </div>
          </aside>

          <section class="col-lg-9">
            <article class="question-panel">
              <div class="question-meta">
                <span id="questionCounter">ข้อ 1 / 1</span>
                <span id="savedStatus">บันทึกอัตโนมัติแล้ว</span>
              </div>
              <h2 id="questionText" class="question-title"></h2>
              <div id="choiceList" class="choice-list"></div>
            </article>

            <div class="exam-actions">
              <button id="prevBtn" class="btn btn-outline-primary" type="button">ก่อนหน้า</button>
              <button id="nextBtn" class="btn btn-primary" type="button">ถัดไป</button>
              <button id="submitBtn" class="btn btn-danger ms-lg-auto" type="button">ส่งข้อสอบ</button>
            </div>
          </section>
        </div>
      </section>

      <section id="resultPanel" class="result-panel d-none">
        <h2 class="h4">ผลการสอบ</h2>
        <p id="finalScore" class="score-line"></p>
        <div id="resultSummary" class="result-summary"></div>
        <div class="d-flex gap-2 flex-wrap mt-4">
          <button id="reviewBtn" class="btn btn-primary" type="button">ดูเฉลยรายข้อ</button>
          <button id="restartBtn" class="btn btn-outline-primary" type="button">เริ่มสอบใหม่</button>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
